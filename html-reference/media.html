<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A website page that focuses of demonstration of html media elements and their attributes">
    <title>Media.html</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="experiments.html">Experiments</a></li>
            <li><a href="deprecated.html">Depreciated</a></li>
            <li><a href="forms.html">Forms</a></li>
            <li><a href="index.html">Home</a></li>
            <li><a href="media.html">Media</a></li>
            <li><a href="structured.html">Forms</a></li>
            <li><a href="tables.html">Tables</a></li>
            <li><a href="text.html">Text</a></li>
        </ul>
    </nav>
    <h1> This is the page which displays media elements</h1>
    
    <figure>
        <img src="assets/campus.jpg" alt="View of a university campus courtyard" width="500" height="300">
        <figcaption>A sample campus image displayed inside a figure element.</figcaption>
    </figure>

    <picture>
        <source media="(min-width: 900px)" srcset="assets/campus-large.jpg">
        <source media="(min-width: 500px)" srcset="assets/campus-medium.jpg">
        <img src="assets/campus-small.jpg" alt="Responsive campus image" width="500" height="300">
    </picture>

    <audio controls loop muted>
        <source src="assets/sample.mp3" type="audio/mpeg">
        <source src="assets/sample.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

    <video controls poster="assets/poster.jpg" width="500">
        <source src="assets/sample.mp4" type="video/mp4">
        <source src="assets/sample.webm" type="video/webm">
        <track src="assets/captions.vtt" kind="captions" srclang="en" label="English">
        Your browser does not support the video tag.
    </video>

    <iframe
        src="https://www.youtube.com/watch?v=gLFvJ1j0SuU"
        width="560"
        height="315"
        title="Embedded video example">
    </iframe>

    <embed src="assets/sample.pdf" type="application/pdf" width="500" height="300">

    <!-- Param is ignored becuase modern browsers use built in .svg viewers that does not read <param> values 
     
    However, the validator still gives us fuss about the param attribute, but we cannot circumvent this validator fuss,
     as the param value must be included due to the assignment specifications--> 
    <object data="assets/diagram.svg" type="image/svg+xml" width="400" height="250">
        <param value="0 0 400 250">
        Your browser does not support this object.
    </object>


    <canvas id="myCanvas" width="200" height="200"></canvas>
    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "blue";
        ctx.fillRect(40, 40, 100, 100);
    </script>


    <svg width="250" height="150" aria-label="An SVG circle and rectangle">
        <circle cx="60" cy="75" r="40" fill="red"></circle>
        <rect x="130" y="35" width="80" height="80" fill="green"></rect>
    </svg>

    <img src="assets/map-image.jpg" alt="Sample image map with clickable regions" usemap="#samplemap" width="500" height="300">
    <map name="samplemap">
        <area shape="rect" coords="50,50,150,150" href="https://www.sandiego.edu/" alt="USD website homepage">
        <area shape="circle" coords="300,150,40" href="https://www.sandiego.edu/admission-and-aid/undergraduate/apply/" alt="USD application page">
    </map>


</body>
</html>
